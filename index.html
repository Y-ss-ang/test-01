<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>问题</title>
</head>
<body>
    <h1>1+1等于多少？</h1>
    <input type="text" id="answer" placeholder="请输入答案">
    <button onclick="check()">提交</button>
    <p id="result"></p>

    <script>
        function check() {
            const val = document.getElementById('answer').value.trim();
            const msg = document.getElementById('result');
            msg.textContent = val === '2' ? '正确！' : '再想想...';
        }
    </script>
</body>
</html>
