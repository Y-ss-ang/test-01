<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .container {
            background: rgba(255,255,255,.05);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -8px rgba(0,0,0,.6);
            border: 1px solid rgba(255,255,255,.08);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            color: #fff;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .score-box {
            background: rgba(255,255,255,.08);
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        .score-box span { color: #ffd200; }
        canvas {
            display: block;
            border-radius: 12px;
            background: #1a1a2e;
            width: 500px;
            height: 500px;
            touch-action: none;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            color: rgba(255,255,255,.5);
            font-size: 13px;
        }
        .restart-btn {
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.12);
            color: #fff;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: .2s;
        }
        .restart-btn:hover {
            background: rgba(255,255,255,.15);
        }
        .dpad {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin-top: 16px;
        }
        .dpad-row { display: flex; gap: 44px; }
        .dpad-btn {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,.15);
            background: rgba(255,255,255,.08);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: .1s;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,.2);
            transform: scale(.92);
        }
        #overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,.6);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            gap: 12px;
        }
        #overlay.show { display: flex; }
        #overlay h2 { font-size: 28px; }
        #overlay p { font-size: 15px; opacity: .7; }
        #overlay .final span { color: #ffd200; font-size: 22px; }
        .canvas-wrap { position: relative; }
        @media (max-width: 560px) {
            .container { padding: 16px; }
            canvas { width: 340px; height: 340px; }
            .dpad { display: flex; }
            .dpad-btn { width: 48px; height: 48px; font-size: 18px; }
            .dpad-row { gap: 36px; }
            #restartHint { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐍 贪吃蛇</h1>
            <div class="score-box">得分 <span id="score">0</span></div>
        </div>
        <div class="canvas-wrap">
            <canvas id="game" width="500" height="500"></canvas>
            <div id="overlay">
                <h2>游戏结束</h2>
                <div class="final">得分 <span id="finalScore">0</span></div>
                <p id="restartHint">按「空格键」重新开始</p>
            </div>
        </div>
        <div class="controls">
            <span>← ↑ → ↓  /  W A S D</span>
            <button class="restart-btn" id="restartBtn">重新开始</button>
        </div>
        <div class="dpad" id="dpad">
            <div class="dpad-row">
                <button class="dpad-btn" data-dir="up">▲</button>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" data-dir="left">◀</button>
                <button class="dpad-btn" data-dir="down">▼</button>
                <button class="dpad-btn" data-dir="right">▶</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('finalScore');
        const overlay = document.getElementById('overlay');

        const SIZE = 20;
        const COLS = 25;
        const ROWS = 25;

        const NORMAL_MS = 180;
        const BOOST_MS = 80;
        let snake, dir, nextDir, food, score, gameOver, loop;
        let boostKeyHeld = false;
        const heldDirs = new Set();

        function hsl(i, total) {
            return `hsl(${Math.round(120 + (i / total) * 300)}, 85%, 60%)`;
        }

        function randFood() {
            const set = new Set(snake.map(p => `${p.x},${p.y}`));
            let free = [];
            for (let x = 0; x < COLS; x++)
                for (let y = 0; y < ROWS; y++)
                    if (!set.has(`${x},${y}`)) free.push({ x, y });
            if (!free.length) return null;
            return free[Math.floor(Math.random() * free.length)];
        }

        function init() {
            snake = [
                { x: 7, y: 12 },
                { x: 6, y: 12 },
                { x: 5, y: 12 },
                { x: 4, y: 12 },
            ];
            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            score = 0;
            gameOver = false;
            overlay.classList.remove('show');
            scoreEl.textContent = '0';
            food = randFood();
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, 500, 500);

            // grid
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#1a1a2e' : '#16213e';
                    ctx.fillRect(x * SIZE, y * SIZE, SIZE, SIZE);
                }
            }

            // snake
            const len = snake.length;
            for (let i = len - 1; i >= 0; i--) {
                const p = snake[i];
                const color = hsl(i, len);
                const pad = i === 0 ? 1 : 2;
                const r = 4 - (i === 0 ? 1 : 0.5);

                ctx.shadowColor = color;
                ctx.shadowBlur = i === 0 ? 14 : 6;
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.roundRect(p.x * SIZE + pad, p.y * SIZE + pad, SIZE - pad * 2, SIZE - pad * 2, r);
                ctx.fill();

                // eyes on head
                if (i === 0) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    const ex1 = p.x * SIZE + 5, ey1 = p.y * SIZE + 6;
                    const ex2 = p.x * SIZE + 13, ey2 = p.y * SIZE + 6;
                    ctx.beginPath(); ctx.arc(ex1, ey1, 2.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(ex2, ey2, 2.5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#111';
                    ctx.beginPath(); ctx.arc(ex1 + (dir.x || dir.y), ey1 + (dir.x || dir.y), 1.3, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(ex2 + (dir.x || dir.y), ey2 + (dir.x || dir.y), 1.3, 0, Math.PI * 2); ctx.fill();
                }
            }
            ctx.shadowBlur = 0;

            // food
            if (food) {
                const fx = food.x * SIZE + SIZE / 2;
                const fy = food.y * SIZE + SIZE / 2;
                const hue = (Date.now() / 10) % 360;
                ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
                ctx.shadowBlur = 20;

                const rad = SIZE / 2 - 2;
                ctx.fillStyle = `hsl(${hue}, 100%, 65%)`;
                ctx.beginPath();
                ctx.arc(fx, fy, rad, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.fillStyle = `hsl(${hue}, 100%, 80%)`;
                ctx.beginPath();
                ctx.arc(fx - 2, fy - 2, rad * .35, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.shadowBlur = 0;
        }

        function tick() {
            if (gameOver) return;

            dir = { ...nextDir };
            setSpeed(heldDirs.has(`${dir.x},${dir.y}`));
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            // wall collision
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                endGame();
                return;
            }

            // self collision
            for (const s of snake) {
                if (s.x === head.x && s.y === head.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            if (food && head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                food = randFood();
                if (!food) { endGame(); return; }
            } else {
                snake.pop();
            }

            draw();
        }

        function endGame() {
            gameOver = true;
            finalScoreEl.textContent = score;
            overlay.classList.add('show');
            clearInterval(loop);
        }

        function setSpeed(boost) {
            if (boost === boostKeyHeld) return;
            boostKeyHeld = boost;
            clearInterval(loop);
            loop = setInterval(tick, boost ? BOOST_MS : NORMAL_MS);
        }

        function startLoop() {
            boostKeyHeld = false;
            if (loop) clearInterval(loop);
            loop = setInterval(tick, NORMAL_MS);
        }

        function restart() {
            clearInterval(loop);
            heldDirs.clear();
            boostKeyHeld = false;
            init();
            startLoop();
        }

        // input
        const keyMap = {
            ArrowUp:    { x: 0, y: -1 },
            ArrowDown:  { x: 0, y: 1 },
            ArrowLeft:  { x: -1, y: 0 },
            ArrowRight: { x: 1, y: 0 },
            w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
            s: { x: 0, y: 1 },  S: { x: 0, y: 1 },
            a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
            d: { x: 1, y: 0 },  D: { x: 1, y: 0 },
        };
        document.addEventListener('keydown', e => {
            const key = e.key;
            if (key === ' ' && gameOver) { e.preventDefault(); restart(); return; }
            const nd = keyMap[key];
            if (!nd) return;
            e.preventDefault();
            heldDirs.add(`${nd.x},${nd.y}`);
            if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
        });
        document.addEventListener('keyup', e => {
            const nd = keyMap[e.key];
            if (nd) heldDirs.delete(`${nd.x},${nd.y}`);
        });

        document.getElementById('restartBtn').addEventListener('click', restart);

        // dpad buttons
        const dirMap = { up: {x:0,y:-1}, down: {x:0,y:1}, left: {x:-1,y:0}, right: {x:1,y:0} };
        document.querySelectorAll('.dpad-btn').forEach(btn => {
            btn.addEventListener('touchstart', e => {
                e.preventDefault();
                const nd = dirMap[btn.dataset.dir];
                if (!nd) return;
                heldDirs.add(`${nd.x},${nd.y}`);
                if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
            }, { passive: false });
            btn.addEventListener('touchend', e => {
                const nd = dirMap[btn.dataset.dir];
                if (nd) heldDirs.delete(`${nd.x},${nd.y}`);
            }, { passive: true });
            btn.addEventListener('mousedown', e => {
                const nd = dirMap[btn.dataset.dir];
                if (!nd) return;
                heldDirs.add(`${nd.x},${nd.y}`);
                if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
            });
            btn.addEventListener('mouseup', e => {
                const nd = dirMap[btn.dataset.dir];
                if (nd) heldDirs.delete(`${nd.x},${nd.y}`);
            });
        });

        // touch / swipe support
        let tx = 0, ty = 0;
        canvas.addEventListener('touchstart', e => {
            const t = e.touches[0];
            tx = t.clientX; ty = t.clientY;
        }, { passive: true });
        canvas.addEventListener('touchend', e => {
            const t = e.changedTouches[0];
            const dx = t.clientX - tx, dy = t.clientY - ty;
            const adx = Math.abs(dx), ady = Math.abs(dy);
            if (adx < 20 && ady < 20) return;
            let nd;
            if (adx > ady) nd = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
            else nd = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
            if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
        }, { passive: true });

        init();
        startLoop();
    </script>
</body>
</html>
