<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌟 偶像模拟器 - Idol Simulator</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: { preflight: false },  // 避免覆盖自定义样式
    }
  </script>

  <!-- 自定义样式 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============================================================
       事件弹窗 (全局共用 Overlay)
       ============================================================ -->
  <div class="event-modal-overlay" id="event-modal-overlay">
    <div class="event-modal">
      <div class="icon" id="event-modal-icon">🌟</div>
      <h3 id="event-modal-title">事件标题</h3>
      <p id="event-modal-text">事件描述</p>
      <div id="event-modal-effects" class="text-sm text-white/60 mb-4"></div>
      <button id="event-modal-btn">确 认</button>
    </div>
  </div>

  <!-- ============================================================
       屏幕 1: 标题页面
       ============================================================ -->
  <div class="screen active" id="screen-title">
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="text-center" style="animation: fadeIn .6s ease-out;">

        <!-- 标题 -->
        <div class="text-6xl mb-4" style="animation: float 4s ease-in-out infinite;">🌟</div>
        <h1 class="text-5xl font-black gradient-text mb-2">偶像模拟器</h1>
        <p class="text-white/50 text-lg mb-2">Idol Simulator</p>
        <p class="text-white/40 text-sm mb-10">成为最闪亮的星星 ✨</p>

        <!-- 按钮组 -->
        <div class="flex flex-col items-center gap-4 max-w-xs mx-auto">
          <button onclick="App.startNewGame()"
                  class="btn-gradient w-full text-lg py-3">
            ✨ 新的旅程
          </button>

          <button onclick="App.continueGame()"
                  class="continue-btn glass-card w-full py-3 px-6 text-white/80 font-medium
                         hover:text-white hover:bg-white/10 transition-all">
            📂 继续游戏
          </button>

          <button onclick="App.resetGame()"
                  class="text-sm text-white/30 hover:text-red-400 transition-colors mt-2">
            🗑️ 重置游戏
          </button>
        </div>

        <!-- 版本号 -->
        <p class="text-white/20 text-xs mt-12">v1.0.0 · Made with ❤️</p>
      </div>
    </div>
  </div>

  <!-- ============================================================
       屏幕 2: 角色创建
       ============================================================ -->
  <div class="screen" id="screen-create">
    <!-- 由 CharacterCreator.render() 动态渲染 -->
  </div>

  <!-- ============================================================
       屏幕 3: 游戏主界面
       ============================================================ -->
  <div class="screen" id="screen-game">
    <div class="min-h-screen p-4 md:p-6">

      <!-- 顶部信息栏 -->
      <div class="glass-card p-4 mb-4" id="header-info">
        <!-- 由 UI.renderHeader() 动态渲染 -->
      </div>

      <!-- 主网格：左侧属性 + 右侧日程 -->
      <div class="game-grid grid grid-cols-1 md:grid-cols-3 gap-4">

        <!-- 左列：属性面板 (占2列) -->
        <div class="md:col-span-2 space-y-3">
          <!-- 属性面板 -->
          <div id="stats-panel">
            <!-- 由 UI.renderStats() 动态渲染 -->
          </div>
          <!-- 事件日志 -->
          <div id="log-panel">
            <!-- 由 UI.renderLog() 动态渲染 -->
          </div>
        </div>

        <!-- 右列：日程面板 -->
        <div id="schedule-panel" class="space-y-3">
          <!-- 由 Schedule.render() 动态渲染 -->
        </div>

      </div>

      <!-- 底部工具栏（手机端自动变为 2x2 网格） -->
      <div class="mt-4 flex flex-wrap justify-center gap-3 bottom-toolbar">
        <button onclick="App.saveGame()"
                class="px-5 py-2 rounded-full bg-white/5 border border-white/10 text-sm text-white/60
                       hover:text-white hover:bg-white/10 transition-all">
          💾 存档
        </button>
        <button onclick="App.loadGame()"
                class="px-5 py-2 rounded-full bg-white/5 border border-white/10 text-sm text-white/60
                       hover:text-white hover:bg-white/10 transition-all">
          📂 读档
        </button>
        <button onclick="if(confirm('确定要重置游戏吗？')){App.resetGame();App.backToTitle();}"
                class="px-5 py-2 rounded-full bg-white/5 border border-white/10 text-sm text-red-400/60
                       hover:text-red-400 hover:bg-white/10 transition-all">
          🗑️ 重置游戏
        </button>
        <button onclick="App.backToTitle()"
                class="px-5 py-2 rounded-full bg-white/5 border border-white/10 text-sm text-white/60
                       hover:text-white hover:bg-white/10 transition-all">
          🏠 返回标题
        </button>
      </div>

    </div>
  </div>

  <!-- ============================================================
       屏幕 4: 游戏结束
       ============================================================ -->
  <div class="screen" id="screen-gameover">
    <div class="min-h-screen flex items-center justify-center p-4 gameover-content">
      <!-- 由 App.showGameOver() 动态渲染 -->
    </div>
  </div>

  <!-- ============================================================
       JavaScript 模块 (按依赖顺序加载)
       ============================================================ -->
  <script src="js/config.js"></script>      <!-- 游戏配置 -->
  <script src="js/state.js"></script>       <!-- 存档管理 -->
  <script src="js/ui.js"></script>          <!-- UI渲染（被其他模块依赖） -->
  <script src="js/character.js"></script>   <!-- 角色创建 -->
  <script src="js/events.js"></script>      <!-- 随机事件 -->
  <script src="js/growth.js"></script>      <!-- 成长系统 -->
  <script src="js/schedule.js"></script>    <!-- 日程系统 -->
  <script src="js/app.js"></script>         <!-- 主控制器 -->

</body>
</html>
